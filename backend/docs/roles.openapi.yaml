openapi: 3.0.0
info:
  title: Roles & Permissions API
  version: 1.0.0
  description: API endpoints for managing Tenant roles and evaluating permissions.
paths:
  /api/v1/permissions:
    get:
      summary: Get Permission Catalogue
      description: Returns the full canonical list of permissions grouped by module_name.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          description:
                            type: string

  /api/v1/roles:
    get:
      summary: List Roles
      description: Returns a paginated list of the current tenant's roles.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
    post:
      summary: Create Role
      description: Creates a new custom role and assigns it permissions.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                permission_keys:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created successfully
        '403':
          description: Privilege Escalation Attempt

  /api/v1/roles/{id}:
    get:
      summary: Get Role by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
    put:
      summary: Update Role
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                permission_keys:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated successfully
    delete:
      summary: Delete Role
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
      responses:
        '200':
          description: Deleted successfully
        '409':
          description: Role in use
