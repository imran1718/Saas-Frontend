openapi: 3.0.0
info:
  title: Company Profile & Pickup Address Management API
  version: 1.0.0
  description: API endpoints for managing tenant company profile and pickup addresses.
paths:
  /company/profile:
    get:
      summary: Get tenant profile
      description: Retrieve the company profile for the authenticated tenant.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Tenant profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      company_name:
                        type: string
                      legal_name:
                        type: string
                      gstin:
                        type: string
                      business_type:
                        type: string
                      support_email:
                        type: string
                      support_phone:
                        type: string
                      logo_url:
                        type: string
                      profile_completed:
                        type: boolean
                      kyc_status:
                        type: string
        '401':
          description: Unauthorized
    put:
      summary: Update profile fields
      description: Update company profile details for the authenticated tenant.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                legal_name:
                  type: string
                  maxLength: 150
                gstin:
                  type: string
                  pattern: '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$'
                business_type:
                  type: string
                  enum: [individual, proprietorship, partnership, pvt_ltd, llp, other]
                support_email:
                  type: string
                  format: email
                support_phone:
                  type: string
      responses:
        '200':
          description: Company profile updated successfully
        '422':
          description: Validation error
  /company/documents:
    get:
      summary: List uploaded KYC documents
      description: Retrieve a list of all KYC documents uploaded by the tenant.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of documents retrieved successfully
    post:
      summary: Upload KYC document
      description: Upload a new KYC document (PAN, GST certificate, address proof).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type:
                  type: string
                  enum: [pan, gst_certificate, address_proof, other]
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploaded successfully
        '422':
          description: File size or mime-type rejected
  /company/documents/{id}:
    delete:
      summary: Remove a document
      description: Delete an uploaded KYC document. Only allowed if the document status is not yet verified.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted successfully
        '409':
          description: Document already verified (blocks deletion)
  /addresses:
    get:
      summary: List pickup addresses
      description: Get all pickup addresses for the tenant.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: is_default
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            default: 'created_at:desc'
      responses:
        '200':
          description: List of addresses retrieved successfully
    post:
      summary: Create pickup address
      description: Create a new pickup address.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, contact_name, contact_phone, address_line1, city, state, pincode]
              properties:
                label:
                  type: string
                  minLength: 2
                  maxLength: 100
                contact_name:
                  type: string
                contact_phone:
                  type: string
                address_line1:
                  type: string
                address_line2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                pincode:
                  type: string
                  pattern: '^[1-9][0-9]{5}$'
                is_default:
                  type: boolean
      responses:
        '201':
          description: Address created successfully
        '422':
          description: Validation error
  /addresses/{id}:
    get:
      summary: Get address details
      description: Retrieve details of a specific pickup address.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address details retrieved successfully
    put:
      summary: Update pickup address
      description: Update details of a specific pickup address.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                contact_name:
                  type: string
                contact_phone:
                  type: string
                address_line1:
                  type: string
                address_line2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                pincode:
                  type: string
                is_default:
                  type: boolean
      responses:
        '200':
          description: Address updated successfully
    delete:
      summary: Soft-delete pickup address
      description: Soft-delete a pickup address.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address deleted successfully
        '409':
          description: Blocked from deleting default address without replacement
  /addresses/{id}/set-default:
    put:
      summary: Set address as default
      description: Promote a specific pickup address to be the default address for the tenant.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Default address updated successfully
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
